version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: inovareti_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inovare_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: inovareti_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - inovare_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: inovareti_api
    restart: always
    env_file: .env
    environment:
      - SERVER_PORT=8085
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/inovareti
    expose:
      - "8085"
    ports:
      - "8085:8085"
    volumes:
      - ./uploads:/app/uploads
      - ${BACKUP_HDD_PATH}:/app/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inovare_network

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: inovareti_front
    restart: always
    ports:
      - "5173:80"
      # - "8085:80"
    depends_on:
      - api
    networks:
      - inovare_network

  prometheus:
    image: prom/prometheus:latest
    container_name: inovareti_prometheus
    restart: always
    ports:
      - "9095:9090"
    volumes:
      - ./docs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docs/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      # Regras do Circuit Breaker Feegow (criadas na sprint de alertas)
      - ./api/prometheus.rules.yml:/etc/prometheus/prometheus.rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api
      - redis
    networks:
      - inovare_network

  grafana:
    image: grafana/grafana:latest
    container_name: inovareti_grafana
    restart: always
    environment:
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - inovare_network

networks:
  inovare_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data: