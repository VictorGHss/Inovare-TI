discord.bot.enabled=false
spring.mail.host=localhost
app.frontend.url=http://localhost:3000
contaazul.redirect-uri=http://localhost/contaazul/callback
flyway.enabled=false
api.security.token.secret=test-secret
app.security.encryption.secret=test-encryption-secret
app.vault.encryption-key=test-vault-key
file.upload-dir=target/test-uploads
server.port=0
# Banco H2 em memória para testes
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.generate-ddl=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Placeholders para integrações externas (valores seguros vazios para testes)
discord.webhook.url=
discord.bot.token=
app.contaazul.client-id=${CONTAAZUL_CLIENT_ID:}
app.contaazul.client-secret=${CONTAAZUL_CLIENT_SECRET:}
app.contaazul.authorization-url=http://localhost/authorize
app.contaazul.token-url=http://localhost/token
app.contaazul.payments-url=http://localhost/contaazul/payments
app.contaazul.baixa-details-url=http://localhost/contaazul/baixa
app.contaazul.receipt-pdf-url-template=http://localhost/contaazul/receipts/{id}.pdf
app.contaazul.parcela-by-id-url-template=http://localhost/contaazul/parcela/{id}
app.contaazul.sales-v2-url=http://localhost/contaazul/sales/v2
app.contaazul.sales-pdf-v1-url-template=http://localhost/contaazul/sales/{id}/pdf
app.contaazul.automation.initial-delay-ms=0
app.contaazul.automation.fixed-delay-ms=60000
app.contaazul.automation.enabled=false
app.contaazul.api-v2-base-url=http://localhost/contaazul/api/v2
app.contaazul.customer-by-id-v1-url-template=http://localhost/contaazul/customers/{id}
app.financeiro.test-mode=true
app.financeiro.dev-email=test+financeiro@example.com
app.financeiro.smtp.from-email=test+financeiro-from@example.com
app.financeiro.smtp.from-name=Inovare Financeiro Teste
spring.scheduling.enabled=false
