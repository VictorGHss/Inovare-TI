<!doctype html>
<html lang="pt-BR">
  <head>
    <script>
      // Limpeza forçada de Service Workers legados para destravar o cache do navegador
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          if (registrations.length > 0) {
            if (!localStorage.getItem('pwa-sw-cleared-v3')) {
              for (let reg of registrations) {
                reg.unregister();
              }
              localStorage.setItem('pwa-sw-cleared-v3', 'true');
              console.log('Service Worker antigo removido para atualização de assets.');
              window.location.reload();
            }
          }
        });
      }
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffa751" />
    <meta name="description" content="Sistema de gestão de chamados, ativos e inventário de TI" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Inovare TI" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Inovare TI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
