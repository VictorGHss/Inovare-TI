## Snippet Nginx para servir sw.js com cache-control apropriado
# Coloque este bloco dentro do server { ... } do seu site (ex.: /etc/nginx/sites-available/itsm)

  # Garantir que o service worker não seja cacheado por proxies/clients
  location = /sw.js {
    try_files /sw.js =404;
    add_header Cache-Control "no-cache, must-revalidate, max-age=0";
  }

  # Assets com hash podem ser cacheados longamente (immutable)
  # O fallback para index.html garante que rotas do React Router (como /assets ou /assets/) carreguem sem dar 404
  location /assets/ {
    try_files $uri /index.html;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
