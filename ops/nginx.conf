# ==============================================================================
# INOVARE-TI: CONFIGURAÇÃO DO REVERSE PROXY NGINX (itms-inovare.ctrls.dev.br)
# ==============================================================================

# Redirecionamento automático de HTTP (porta 80) para HTTPS (porta 443)
server {
    listen 80;
    listen [::]:80;
    server_name itms-inovare.ctrls.dev.br;

    # Desafio ACME do Let's Encrypt para renovação de certificados
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Servidor HTTPS seguro (porta 443)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name itms-inovare.ctrls.dev.br;

    # Caminhos absolutos para chaves SSL gerenciadas pelo certbot
    ssl_certificate /etc/letsencrypt/live/itms-inovare.ctrls.dev.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/itms-inovare.ctrls.dev.br/privkey.pem;

    # Configurações otimizadas de Segurança SSL/TLS (Ciphers modernos)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Limite máximo de tamanho do corpo da requisição para uploads (10MB)
    client_max_body_size 10M;

    # Proxy reverso para a API do Spring Boot (porta 8085 exposta no compose)
    location /api/ {
        proxy_pass http://127.0.0.1:8085/api/;
        
        # Cabeçalhos cruciais para o repasse do IP Real e Protocolo Original (essencial para assinatura HMAC do Blip)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;

        # Ajuste de timeouts para suportar APIs externas e operações pesadas de backup
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy para suporte integral a WebSockets (endpoint /ws)
    location /ws/ {
        proxy_pass http://127.0.0.1:8085/ws/;
        
        # Cabeçalhos específicos para negociação e persistência de WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Cabeçalhos padrão adicionais
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 86400s;
    }

    # Proxy reverso para o Frontend SPA (porta 5173 do container)
    location / {
        proxy_pass http://127.0.0.1:5173/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Suporte a SPA (Single Page Application) - redireciona rotas inexistentes ao index
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }

    # Controle cirúrgico do cache do Service Worker (SW.js nunca em cache)
    location = /sw.js {
        proxy_pass http://127.0.0.1:5173/sw.js;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Sobrescreve cabeçalhos de controle de cache
        add_header Cache-Control "no-cache, must-revalidate, max-age=0";
    }

    # Cache de longo prazo para assets estáticos estáticos imutáveis
    location /assets/ {
        proxy_pass http://127.0.0.1:5173/assets/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache de 1 ano
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
