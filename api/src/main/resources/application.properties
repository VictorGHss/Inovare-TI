spring.application.name=inovare-ti
server.port=${API_PORT}
server.servlet.context-path=/api
spring.datasource.url=${DB_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.data.redis.repositories.enabled=false
# Conexão do Redis via variáveis de ambiente para cache distribuído.
spring.data.redis.host=${SPRING_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.fail-on-missing-locations=true
spring.flyway.locations=classpath:db/migration
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html;charset=UTF-8
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
logging.level.br.dev.ctrls.inovareti=DEBUG
logging.level.br.dev.ctrls.inovareti.domain.appointment=DEBUG
spring.jpa.properties.hibernate.type.json_format_mapper=org.hibernate.type.format.jackson.JacksonJsonFormatMapper
api.security.token.secret=${JWT_SECRET}
app.security.encryption.secret=${ENCRYPTION_SECRET}
app.vault.encryption-key=${VAULT_ENCRYPTION_KEY}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.max-file-size-bytes=5242880
file.upload-dir=/app/uploads
app.frontend.url=${FRONTEND_URL}
discord.webhook.url=${DISCORD_WEBHOOK_URL}
discord.bot.token=${DISCORD_BOT_TOKEN}
discord.bot.enabled=${DISCORD_BOT_ENABLED}
app.financeiro.test-mode=${APP_FINANCEIRO_TEST_MODE}
app.financeiro.dev-email=${APP_FINANCEIRO_DEV_EMAIL}
app.financeiro.smtp.from-email=${APP_FINANCEIRO_SMTP_FROM_EMAIL}
app.financeiro.smtp.from-name=${APP_FINANCEIRO_SMTP_FROM_NAME}
app.contaazul.client-id=${CONTAAZUL_CLIENT_ID}
app.contaazul.client-secret=${CONTAAZUL_CLIENT_SECRET}
app.contaazul.authorization-url=${CONTAAZUL_AUTHORIZATION_URL}
contaazul.redirect-uri=${FRONTEND_URL}/api/financeiro/contaazul/callback
app.contaazul.token-url=${CONTAAZUL_TOKEN_URL}
app.contaazul.api-v2-base-url=${CONTAAZUL_API_V2_BASE_URL:https://api-v2.contaazul.com}
app.contaazul.payments-url=${CONTAAZUL_PAYMENTS_URL:${app.contaazul.api-v2-base-url}/v1/financeiro/eventos-financeiros/contas-a-receber/buscar}
app.contaazul.baixa-details-url=${CONTAAZUL_BAIXA_DETAILS_URL:${app.contaazul.api-v2-base-url}/v1/financeiro/eventos-financeiros/parcelas/baixa}
app.contaazul.parcela-by-id-url-template=${CONTAAZUL_PARCELA_BY_ID_URL_TEMPLATE:${app.contaazul.api-v2-base-url}/v1/financeiro/eventos-financeiros/parcelas/{id}}
app.contaazul.receipt-pdf-url-template=${CONTAAZUL_RECEIPT_PDF_URL_TEMPLATE}
app.contaazul.sales-v2-url=${CONTAAZUL_SALES_V2_URL:${app.contaazul.api-v2-base-url}/v1/venda/busca}
app.contaazul.sales-pdf-v1-url-template=${CONTAAZUL_SALE_PDF_V1_URL_TEMPLATE:${app.contaazul.api-v2-base-url}/v1/venda/{id}/imprimir}
app.contaazul.customer-by-id-v1-url-template=${CONTAAZUL_CUSTOMER_BY_ID_V1_URL_TEMPLATE:${app.contaazul.api-v2-base-url}/v1/pessoas/{id}}
app.contaazul.automation.enabled=${CONTAAZUL_AUTOMATION_ENABLED:true}
app.contaazul.automation.fixed-delay-ms=${CONTAAZUL_AUTOMATION_FIXED_DELAY_MS:300000}
app.contaazul.automation.initial-delay-ms=${CONTAAZUL_AUTOMATION_INITIAL_DELAY_MS:180000}
app.automation.cron=${APP_AUTOMATION_CRON:0 0 6 28,30 * *}
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
# --- Mail Configuration (Ajuste para SSL Direto - Porta 465) ---
# Configurações para SMTP Seguro (SSL)
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.skymail.net.br
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory

# Timeouts de segurança
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.brevo.sender.email=${BREVO_SENDER_EMAIL}
app.brevo.sender.name=${BREVO_SENDER_NAME}
app.backup.enabled=${APP_BACKUP_ENABLED:true}
app.backup.destination-email=${APP_BACKUP_DESTINATION_EMAIL}
app.backup.pg-dump-binary=${APP_BACKUP_PG_DUMP_BINARY:pg_dump}
app.backup.temp-dir=${APP_BACKUP_TEMP_DIR:/app/backups}
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.group.contaazul.include=ping
app.appointment.motor.enabled=${APP_APPOINTMENT_MOTOR_ENABLED:true}
app.appointment.motor.ingestion-cron=${APP_APPOINTMENT_MOTOR_INGESTION_CRON:0 0 8 * * *}
app.appointment.motor.monitor-cron=${APP_APPOINTMENT_MOTOR_MONITOR_CRON:0 */30 * * * *}
app.appointment.motor.test-mode=${APP_APPOINTMENT_MOTOR_TEST_MODE:false}
app.appointment.motor.test-doctor-id=${APP_APPOINTMENT_MOTOR_TEST_DOCTOR_ID:70}
app.appointment.motor.feegow-base-url=${APP_APPOINTMENT_FEEGOW_BASE_URL:http://localhost:8081}
app.appointment.motor.feegow-token=${APP_APPOINTMENT_FEEGOW_TOKEN:}
app.appointment.motor.feegow-search-path=${APP_APPOINTMENT_FEEGOW_SEARCH_PATH:/api/appointments/search}
app.appointment.motor.feegow-patient-path=${APP_APPOINTMENT_FEEGOW_PATIENT_PATH:/api/patients/{id}}
app.appointment.motor.feegow-update-status-path=${APP_APPOINTMENT_FEEGOW_UPDATE_STATUS_PATH:/api/appointments/{id}/status}
app.appointment.motor.blip-base-url=${APP_APPOINTMENT_BLIP_BASE_URL:http://localhost:8082}
app.appointment.motor.blip-authorization-key=${APP_APPOINTMENT_BLIP_BOT_KEY:}
app.appointment.motor.blip-send-message-path=${APP_APPOINTMENT_BLIP_SEND_MESSAGE_PATH:/messages}
app.appointment.motor.blip-set-context-path=${APP_APPOINTMENT_BLIP_SET_CONTEXT_PATH:/commands}
app.appointment.motor.blip-router-identity=${APP_APPOINTMENT_BLIP_ROUTER_IDENTITY:postmaster@wa.gw.msging.net}
app.appointment.motor.blip-waba-namespace=${APP_APPOINTMENT_BLIP_WABA_NAMESPACE:63a9b11b_7f32_4ca2_8da1_60b6a41de39e}
app.appointment.motor.blip-builder-bot-id=${APP_APPOINTMENT_BLIP_BUILDER_BOT_ID:}
app.appointment.motor.blip-agendamento-bot-id=${APP_APPOINTMENT_BLIP_AGENDAMENTO_BOT_ID:}
app.appointment.motor.blip-rate-limit-ms=${APP_APPOINTMENT_BLIP_RATE_LIMIT_MS:200}
app.appointment.motor.nudge-1-wait-hours=${APP_APPOINTMENT_NUDGE_1_WAIT_HOURS:4}
app.appointment.motor.nudge-final-wait-hours=${APP_APPOINTMENT_NUDGE_FINAL_WAIT_HOURS:4}
app.appointment.motor.send-idempotency-hours=${APP_APPOINTMENT_SEND_IDEMPOTENCY_HOURS:48}
app.appointment.motor.webhook-idempotency-hours=${APP_APPOINTMENT_WEBHOOK_IDEMPOTENCY_HOURS:48}