# ==============================================================================
# INOVARE-TI: PROPERTIES CONFIGURATIONS (application.properties)
# ==============================================================================

# Server Configurations
server.port=${SERVER_PORT}
server.servlet.context-path=/api

# Database Datasource Connections
spring.datasource.url=${DB_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${DB_SHOW_SQL}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.type.json_format_mapper=org.hibernate.type.format.jackson.JacksonJsonFormatMapper

# Timezone Alignment Configurations (resolves the +3h offset mismatch)
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo
spring.jackson.time-zone=America/Sao_Paulo

# Redis Cache Configurations
spring.data.redis.repositories.enabled=false
spring.data.redis.host=${SPRING_REDIS_HOST}
spring.data.redis.port=${SPRING_REDIS_PORT}

# Database Migrations (Flyway)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.fail-on-missing-locations=true
spring.flyway.locations=classpath:db/migration

# Thymeleaf Template Engine Configurations
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html;charset=UTF-8

# Logging Levels Configurations
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
logging.level.br.dev.ctrls.inovareti=DEBUG
logging.level.br.dev.ctrls.inovareti.domain.appointment=DEBUG
logging.level.br.dev.ctrls.inovareti.config.RawBodyLoggingFilter=WARN

# Security Encryption Keys
api.security.token.secret=${JWT_SECRET}
app.security.encryption.secret=${ENCRYPTION_SECRET}
app.vault.encryption-key=${VAULT_ENCRYPTION_KEY}

# File Upload Configurations
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.max-file-size-bytes=5242880
file.upload-dir=${FILE_UPLOAD_DIR:/mnt/storage/uploads/}

# ConfiguraĂ§Ăµes de Acesso ao Frontend
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:${FRONTEND_URL:http://localhost:5173}}
app.cors.allowed-origin-patterns=
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# Discord Webhook & Bot Configurations
discord.webhook.url=${DISCORD_WEBHOOK_URL}
discord.bot.token=${DISCORD_BOT_TOKEN}
discord.bot.enabled=${DISCORD_BOT_ENABLED}
app.notification.discord-webhook=${DISCORD_WEBHOOK_URL}

# ITSM Notification Bot Credentials
app.notification.itsm-bot-api-url=${APP_NOTIFICATION_ITSM_BOT_API_URL}
app.notification.itsm-bot-api-token=${APP_NOTIFICATION_ITSM_BOT_API_TOKEN}

# Financeiro Operations Configurations
app.financeiro.test-mode=${APP_FINANCEIRO_TEST_MODE}
app.financeiro.dev-email=${APP_FINANCEIRO_DEV_EMAIL}
app.financeiro.smtp.from-email=${APP_FINANCEIRO_SMTP_FROM_EMAIL}
app.financeiro.smtp.from-name=${APP_FINANCEIRO_SMTP_FROM_NAME}

# SMTP Mail Server Connection
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE}
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${SMTP_HOST}
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Brevo Integrations Credentials
app.brevo.sender.email=${BREVO_SENDER_EMAIL}
app.brevo.sender.name=${BREVO_SENDER_NAME}

# ContaAzul API (v2) Configurations
app.contaazul.client-id=${CONTAAZUL_CLIENT_ID}
app.contaazul.client-secret=${CONTAAZUL_CLIENT_SECRET}
app.contaazul.authorization-url=${CONTAAZUL_AUTHORIZATION_URL}
contaazul.redirect-uri=${CONTAAZUL_REDIRECT_URI}
app.contaazul.token-url=${CONTAAZUL_TOKEN_URL}
app.contaazul.api-v2-base-url=${CONTAAZUL_API_V2_BASE_URL}
app.contaazul.payments-url=${CONTAAZUL_PAYMENTS_URL}
app.contaazul.baixa-details-url=${CONTAAZUL_BAIXA_DETAILS_URL}
app.contaazul.parcela-by-id-url-template=${CONTAAZUL_PARCELA_BY_ID_URL_TEMPLATE}
app.contaazul.receipt-pdf-url-template=${CONTAAZUL_RECEIPT_PDF_URL_TEMPLATE}
app.contaazul.sales-v2-url=${CONTAAZUL_SALES_V2_URL}
app.contaazul.sales-pdf-v1-url-template=${CONTAAZUL_SALE_PDF_V1_URL_TEMPLATE}
app.contaazul.customer-by-id-v1-url-template=${CONTAAZUL_CUSTOMER_BY_ID_V1_URL_TEMPLATE}
app.contaazul.automation.enabled=${CONTAAZUL_AUTOMATION_ENABLED}
app.contaazul.automation.fixed-delay-ms=${CONTAAZUL_AUTOMATION_FIXED_DELAY_MS}
app.contaazul.automation.initial-delay-ms=${CONTAAZUL_AUTOMATION_INITIAL_DELAY_MS}

# Application Automation Cron
app.automation.cron=${APP_AUTOMATION_CRON}

# ConfiguraĂ§Ăµes do Sistema de Backup do Banco de Dados
app.backup.enabled=${APP_BACKUP_ENABLED}
app.backup.destination-email=${APP_BACKUP_DESTINATION_EMAIL}
app.backup.pg-dump-binary=${APP_BACKUP_PG_DUMP_BINARY:}
app.backup.temp-dir=${APP_BACKUP_DIR:/app/backups}
app.backup.zip-password=${APP_BACKUP_ZIP_PASSWORD:}
backup.hdd.path=${BACKUP_HDD_PATH}
app.seeder.enabled=${APP_SEEDER_ENABLED}

# Actuator Health & Metrics Configurations
management.endpoint.health.show-details=always
management.endpoint.health.group.contaazul.include=ping
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.health.circuitbreakers.enabled=true

# Appointment Motor Core System Configurations
app.appointment.motor.enabled=${APP_APPOINTMENT_MOTOR_ENABLED}
app.appointment.motor.ingestion-cron=${APP_APPOINTMENT_MOTOR_INGESTION_CRON}
app.appointment.motor.monitor-cron=${APP_APPOINTMENT_MOTOR_MONITOR_CRON}
app.appointment.motor.test-mode=${APP_APPOINTMENT_MOTOR_TEST_MODE:true}
app.appointment.motor.test-doctor-id=${APP_APPOINTMENT_MOTOR_TEST_DOCTOR_ID}
app.appointment.motor.test-phone=${APP_APPOINTMENT_MOTOR_TEST_PHONE:}

# Feegow System Credentials & Paths
app.appointment.motor.feegow-startup-probe-enabled=${APP_APPOINTMENT_FEEGOW_STARTUP_PROBE_ENABLED}
app.appointment.motor.feegow-base-url=${APP_APPOINTMENT_FEEGOW_BASE_URL}
app.feegow.api-key=${APP_FEEGOW_API_KEY}
app.feegow.unidade-id=${FEEGOW_UNIDADE_ID}
app.appointment.motor.feegow-unidade-id=${FEEGOW_UNIDADE_ID}
app.appointment.motor.feegow-search-path=${APP_APPOINTMENT_FEEGOW_SEARCH_PATH}
app.appointment.motor.feegow-patient-path=${APP_APPOINTMENT_FEEGOW_PATIENT_PATH}
app.appointment.motor.feegow-status-path=${APP_APPOINTMENT_FEEGOW_STATUS_PATH}
app.appointment.motor.feegow-professional-path=${APP_APPOINTMENT_FEEGOW_PROFESSIONAL_PATH}
app.appointment.motor.feegow-confirmed-status-id=${APP_APPOINTMENT_FEEGOW_CONFIRMED_STATUS_ID}
app.appointment.motor.feegow-update-status-path=${APP_APPOINTMENT_FEEGOW_UPDATE_STATUS_PATH}

# Blip Unified Base Configurations (Unificados do.env)
app.appointment.motor.blip-base-url=${APP_APPOINTMENT_BLIP_BASE_URL}
app.appointment.motor.blip-authorization-key=${BLIP_BOT_KEY}
app.appointment.motor.blip-router-key=${BLIP_ROUTER_KEY}
app.appointment.motor.blip-desk-key=${APP_APPOINTMENT_BLIP_DESK_KEY:${BLIP_SUBBOT_KEY}}
app.appointment.motor.blip-send-message-path=${APP_APPOINTMENT_BLIP_SEND_MESSAGE_PATH}
app.appointment.motor.blip-set-context-path=${APP_APPOINTMENT_BLIP_SET_CONTEXT_PATH}
app.appointment.motor.blip-router-identity=${BLIP_ROUTER_ID}
app.appointment.motor.blip-waba-namespace=${APP_APPOINTMENT_BLIP_WABA_NAMESPACE}
app.appointment.motor.blip-fallback-templates=${APP_APPOINTMENT_BLIP_FALLBACK_TEMPLATES}
app.appointment.motor.blip-builder-bot-id=${BLIP_SUBBOT_ID}
app.appointment.motor.blip-agendamento-bot-id=${BLIP_ITSM_ID}
app.appointment.motor.blip-landing-confirmacao-itsm-state-id=${APP_BLIP_STATE_LANDING_ITSM}
app.appointment.motor.blip-itsm-flow-id=${APP_BLIP_STATE_ITSM_FLOW_ID}
app.appointment.motor.blip-fluxov1-flow-id=${BLIP_FLOW_ID}
# Aponta o landing block id para o bloco de Estacionamento Neutro do Builder
app.appointment.motor.blip-landing-block-id=${BLIP_BLOCKS_WAITING_RESPONSE}
app.appointment.motor.webhook-token=${APP_BLIP_SECURITY_WEBHOOK_TOKEN}
app.appointment.motor.blip-rate-limit-ms=${APP_APPOINTMENT_BLIP_RATE_LIMIT_MS}
app.appointment.motor.nudge-1-wait-hours=${APP_APPOINTMENT_NUDGE_1_WAIT_HOURS:2}
app.appointment.motor.nudge-final-wait-hours=${APP_APPOINTMENT_NUDGE_FINAL_WAIT_HOURS:24}
app.appointment.motor.send-idempotency-hours=${APP_APPOINTMENT_SEND_IDEMPOTENCY_HOURS:12}
app.appointment.motor.webhook-idempotency-hours=${APP_APPOINTMENT_WEBHOOK_IDEMPOTENCY_HOURS:24}

# Blip Unified Architectural Properties Mapping
blip.router-id=${BLIP_ROUTER_ID}
blip.subbot-id=${BLIP_SUBBOT_ID}
blip.flow-id=${BLIP_FLOW_ID}
blip.router-key=${BLIP_ROUTER_KEY}
blip.subbot-key=${BLIP_SUBBOT_KEY}
blip.blocks.waiting-response=${BLIP_BLOCKS_WAITING_RESPONSE}
blip.blocks.confirm-success=${BLIP_BLOCKS_CONFIRM_SUCCESS:}
blip.blocks.alter-request=${BLIP_BLOCKS_ALTER_REQUEST:}
blip.blocks.preparar-atendimento=${BLIP_BLOCKS_PREPARAR_ATENDIMENTO:a0776d9c-6486-42f3-8a4f-2706f0185908}
blip.texts.confirm-success=${BLIP_TEXT_CONFIRM_SUCCESS}
blip.texts.alter-request=${BLIP_TEXT_ALTER_REQUEST}
blip.webhook.secret=${BLIP_WEBHOOK_SECRET:chave-secreta-blip}
blip.webhook.token=${APP_BLIP_SECURITY_WEBHOOK_TOKEN}

# Virtual Threads enablement (Java 21)
spring.threads.virtual.enabled=true

# Resilience4j Global Configs
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true

# Circuit Breaker para API Feegow (feegowApiCircuit)
resilience4j.circuitbreaker.instances.feegowApiCircuit.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.feegowApiCircuit.sliding-window-size=10
resilience4j.circuitbreaker.instances.feegowApiCircuit.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.feegowApiCircuit.wait-duration-in-open-state=45s
resilience4j.circuitbreaker.instances.feegowApiCircuit.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.feegowApiCircuit.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.feegowApiCircuit.register-health-indicator=true

# Retry para API ContaAzul (contaAzulRetry)
resilience4j.retry.instances.contaAzulRetry.max-attempts=3
resilience4j.retry.instances.contaAzulRetry.wait-duration=1s
resilience4j.retry.instances.contaAzulRetry.enable-exponential-backoff=true
resilience4j.retry.instances.contaAzulRetry.exponential-backoff-multiplier=2

# Retry para API Blip (blipRetry)
resilience4j.retry.instances.blipRetry.max-attempts=3
resilience4j.retry.instances.blipRetry.wait-duration=1s
resilience4j.retry.instances.blipRetry.enable-exponential-backoff=true
resilience4j.retry.instances.blipRetry.exponential-backoff-multiplier=2

