services:
  db:
    image: postgres:16-alpine
    container_name: inovareti_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inovare_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: inovareti_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - inovare_network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: inovareti_api
    restart: always
    env_file:
      - .env
    environment:
      - DB_URL=jdbc:postgresql://db:5432/${POSTGRES_DB}
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    ports:
      - "8085:8085"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - inovare_network

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://itsm-inovare.ctrls.dev.br
    container_name: inovareti_front
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - inovare_network

networks:
  inovare_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: